<body>

    <h1>家計簿アプリ</h1>

    <form>

        <div>
            <label for="amount">金額</label>
            <input
                type="number"
                id="amount"
                placeholder="金額を入力"
            >
        </div>

        <br>

        <div>
            <label for="date">日付</label>
            <input
                type="date"
                id="date"
            >
        </div>

        <br>

        <div>
            <label for="category">カテゴリ</label>
            <select id="category">
                <option>食費</option>
                <option>日用品</option>
                <option>交通費</option>
                <option>趣味</option>
            </select>
        </div>

        <br>

        <div>
            <label for="payment">支払方法</label>
            <select id="payment">
                <option>現金</option>
                <option>PayPay</option>
                <option>楽天カード</option>
            </select>
        </div>

        <br>

        <button 
            type="button"
            id="saveButton"
        >
            保存
        </button>

    </form>

    <script src="js/app.js"></script>

    <hr>

    <h2>登録済み支出</h2>

    <div id ="expenseList"></div>

</body>
