<head>

    <meta charset="UTF-8">

    <title>
        家計簿アプリ
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>


<body>

    <!-- 入力ページ -->
    <div id="inputPage">

        <h1>家計簿アプリ</h1>

        <div class="balance-card">

            <div class="balance-title">
                現在口座残高
            </div>

            <div
                id="balanceDisplay"
                class="balance-amount"
            >
                0円
            </div>

        </div>

        <div class="input-card">

            <h2>収支登録</h2>

            <label>
                <input
                    type="radio"
                    name="transactionType"
                    value="expense"
                    checked
                >
                支出
            </label>

            <label>
                <input
                    type="radio"
                    name="transactionType"
                    value="income"
                >
                収入
            </label>

            <br><br>

            <input
                type="number"
                id="amount"
                placeholder="金額"
            >

            <br><br>

            <input
                type="date"
                id="date"
            >

            <br><br>

            <select id="category">
            </select>

            <br><br>

            <select id="payment">
            </select>

            <br><br>

            <button
                type="button"
                id="saveButton"
            >
                保存
            </button>

        </div>

    </div>

    <!-- 履歴ページ -->
    <div
        id="historyPage"
        style="display:none;"
    >

        <h1>履歴</h1>

        <div id="calendarHeader">

            <button
                type="button"
                id="prevMonth"
            >
                ◀
            </button>

            <span id="calendarTitle">
                2026-06
            </span>

            <button
                type="button"
                id="nextMonth"
            >
                ▶
            </button>

        </div>

        <div id="calendarContainer">
        </div>

    <h3>表示月</h3>

    <select id="expenseMonth">
    </select>

    <br><br>

    <div id="expenseList">
    </div>

</div>

    <!-- 分析ページ -->
    <div
        id="analysisPage"
        style="display:none;"
    >

        <h1>分析</h1>

        <h3>集計対象月</h3>

        <select id="summaryMonth">
        </select>

        <canvas id="categoryChart"></canvas>

        <h3>支払方法別集計</h3>

        <div id="paymentSummary">
        </div>

        <hr>

        <h3>クレジットカード管理</h3>

        <div id="creditCardList">
        </div>

    </div>

    <!-- 設定ページ -->
    <div
        id="settingsPage"
        style="display:none;"
    >

        <h1>設定</h1>

        <h2>カテゴリ管理</h2>

        <input
            type="text"
            id="newCategory"
            placeholder="新しいカテゴリ"
        >

        <br><br>

        <label>
            <input
                type="radio"
                name="categoryType"
                value="expense"
                checked
            >
            支出
        </label>

        <label>
            <input
                type="radio"
                name="categoryType"
                value="income"
            >
            収入
        </label>

        <br><br>

        <button
            type="button"
            id="addCategoryButton"
        >
            カテゴリ追加
        </button>

        <hr>

        <h2>支払方法管理</h2>

        <input
            type="text"
            id="newPayment"
            placeholder="新しい支払方法"
        >

        <br><br>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="cash"
                checked
            >
            現金
        </label>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="emoney"
            >
            電子マネー
        </label>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="credit"
            >
            クレジットカード
        </label>

        <br><br>

        <input
            type="number"
            id="paymentDay"
            placeholder="支払日"
        >

        <br><br>

        <button
            type="button"
            id="addPaymentButton"
        >
            支払方法追加
        </button>

        <hr>

        <h2>口座残高設定</h2>

        <input
            type="number"
            id="balanceInput"
            placeholder="残高入力"
        >

        <button
            type="button"
            id="saveBalanceButton"
        >
            残高保存
        </button>

        <hr>

        <button
            type="button"
            id="resetButton"
        >
            全データ削除
        </button>

    </div>

    <!-- 下部ナビ -->
    <nav id="bottomNav">

        <button
            type="button"
            id="inputTab"
        >
            入力
        </button>

        <button
            type="button"
            id="historyTab"
        >
            履歴
        </button>

        <button
            type="button"
            id="analysisTab"
        >
            分析
        </button>

        <button
            type="button"
            id="settingsTab"
        >
            設定
        </button>

    </nav>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/category.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/summary.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/balance.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/reset.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/calendar.js"></script>

</body>
