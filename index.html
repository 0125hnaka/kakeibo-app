<head>

    <meta charset="UTF-8">

    <title>
        家計簿アプリ
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>


<body>

    <!-- 入力ページ -->
    <div id="inputPage">

        <h1>家計簿アプリ</h1>

        <div class="balance-card">

            <div class="balance-title">
                現在口座残高
            </div>

            <div
                id="balanceDisplay"
                class="balance-amount"
            >
                0円
            </div>

        </div>

        <div class="input-card">

            <h2>収支登録</h2>

            <div class="segment-control">

                <input
                    type="radio"
                    id="expenseRadio"
                    name="transactionType"
                    value="expense"
                    checked
                >

                <label
                    for="expenseRadio"
                    class="segment-button"
                >
                    支出
                </label>

                <input
                    type="radio"
                    id="incomeRadio"
                    name="transactionType"
                    value="income"
                >

                <label
                    for="incomeRadio"
                    class="segment-button"
                >
                    収入
                </label>

            </div>

            <br><br>

            <input
                type="number"
                id="amount"
                placeholder="金額"
            >

            <br><br>

            <input
                type="date"
                id="date"
            >

            <br><br>

            <select id="category">
            </select>

            <br><br>

            <select id="payment">
            </select>

            <br><br>

            <input
                type="text"
                id="memo"
                placeholder="メモ（任意）"
            >

            <br><br>

            <button
                type="button"
                id="saveButton"
            >
                保存
            </button>

        </div>

    </div>

    <!-- 履歴ページ -->
    <div
        id="historyPage"
        style="display:none;"
    >

        <h1>履歴</h1>

        <div id="calendarHeader">

            <button
                type="button"
                id="prevMonth"
            >
                ◀
            </button>

            <span id="calendarTitle">
                2026-06
            </span>

            <button
                type="button"
                id="nextMonth"
            >
                ▶
            </button>

        </div>

        <div id="calendarContainer">
        </div>

        <div
            class="history-filter"
        >   

            <select
                id="historyCategoryFilter"
            >

                <option value="">
                    全カテゴリ
                </option>

            </select>

            <select
                id="historyPaymentFilter"
            >

                <option value="">
                    全支払方法
                </option>

            </select>

        </div>

        <div id="expenseList">
    </div>

</div>

    <!-- 分析ページ -->
    <div
        id="analysisPage"
        style="display:none;"
    >

        <h1>分析</h1>

            <div class="analysis-tabs">

                <button
                    id="summaryTab"
                    class="analysis-tab active"
                >
                    まとめ
                </button>

                <button
                    id="expenseAnalysisTab"
                    class="analysis-tab"
                >
                    支出
                </button>

                <button
                    id="incomeAnalysisTab"
                    class="analysis-tab"
                >
                    収入
                </button>

                <button
                    id="fixedAnalysisTab"
                    class="analysis-tab"
                >
                    固定費
                </button>

                <button
                    id="cardAnalysisTab"
                    class="analysis-tab"
                >
                    クレカ
                </button>

                <button
                    id="assetAnalysisTab"
                    class="analysis-tab"
                >
                    貯金
                </button>

            </div>

            <div id="summaryAnalysisPage">

                <h3>集計対象月</h3>

                <div class="month-navigation">

                    <button
                        id="summaryPrevMonth"
                >
                        ◀
                    </button>

                    <span
                        id="summaryMonthLabel"
                    >
                        2026-06
                    </span>

                    <button
                        id="summaryNextMonth"
                    >
                        ▶
                    </button>

                </div>

                <div class="summary-cards">

                    <div class="summary-card">

                        <div>
                            今月収入
                        </div>

                        <div id="incomeTotal">
                            0円
                        </div>

                    </div>

                    <div class="summary-card">

                        <div>
                            今月支出
                        </div>

                        <div id="expenseTotal">
                            0円
                        </div>

                    </div>

                    <div class="summary-card">

                        <div>
                            収支
                        </div>

                        <div id="balanceTotal">
                            0円
                        </div>

                    </div>

                </div>

                <div class="summary-wide-card">

                    <div class="summary-wide-card-title">
                        現在残高
                    </div>

                    <div
                        id="summarySavingBalance"
                        class="summary-wide-card-value"
                    >
                        0円
                    </div>

                </div>

                <div class="summary-wide-card">

                    <div class="summary-wide-card-title">
                        クレカ未請求額
                    </div>

                    <div
                       id="summaryUnpaidCard"
                       class="summary-wide-card-value"
                    >
                       0円
                    </div>

                </div>

                <div class="summary-wide-card">

                    <div class="summary-wide-card-title">
                        固定費合計
                    </div>

                    <div
                       id="summaryFixedTotal"
                        class="summary-wide-card-value"
                    >
                        0円
                    </div>

                </div>

            </div>

            <div
                id="expenseAnalysisPage"
                style="display:none;"
            >

        <div id="expenseMonthHeader">

            <button
                id="expensePrevMonth"
            >
                ◀
            </button>

            <span
                id="expenseMonthTitle"
            >
            </span>

            <button
                id="expenseNextMonth"
            >
                ▶
            </button>

        </div>

                <canvas
                    id="expenseCategoryChart"
                >
                </canvas>

                <div
                    id="expenseTotalDisplay"
                    class="summary-card"
                    >
                </div>

                <hr>

                <div
                    id="expenseCategoryList"
                >
                </div>

            </div>

            <div
                id="incomeAnalysisPage"
                style="display:none;"
            >

                <div id="incomeMonthHeader">

                    <button
                        id="incomePrevMonth"
                    >
                        ◀
                    </button>

                    <span
                        id="incomeMonthTitle"
                    >
                    </span>

                    <button
                        id="incomeNextMonth"
                    >
                        ▶
                    </button>

                </div>

                <canvas
                    id="incomeCategoryChart"
                >
                </canvas>

                <div
                    id="incomeTotalDisplay"
                    class="summary-card"
                >
                </div>

                <hr>

                <div
                    id="incomeSummary"
                >
                </div>

            </div>

            <div
                id="cardAnalysisPage"
                style="display:none;"
            >

                <div id="cardMonthHeader">

                    <button
                        type="button"
                        id="cardPrevMonth"
                    >
                        ◀
                    </button>

                    <span id="cardMonthTitle">
                    </span>

                    <button
                        type="button"
                        id="cardNextMonth"
                    >
                        ▶
                    </button>

                </div>

                <h2>
                    今月利用額
                </h2>

                 <div
                    id="cardUsageTotal"
                    class="summary-card"
                >
                </div>

                <div
                    id="cardUsageList"
                >
                </div>

                <hr>

                <h2>
                    今月請求額
                </h2>

                <div
                    id="cardBillingTotal"
                    class="summary-card"
                >
                </div>

                <div
                    id="cardBillingList"
                >           
                </div>

            </div>

            <div
                id="fixedAnalysisPage"
                style="display:none;"
            >

                <div id="fixedMonthHeader">

                    <button
                        id="fixedPrevMonth"
                    >
                        ◀
                    </button>

                    <span
                        id="fixedMonthTitle"
                    >
                    </span>

                    <button
                        id="fixedNextMonth"
                     >
                        ▶
                    </button>

                </div>

                <div
                    id="fixedTotalDisplay"
                    class="summary-card"
                >
                </div>

                <hr>

                <div
                    id="fixedCategoryList"
                >
                </div>

            </div>

            <div
                id="assetAnalysisPage"
                style="display:none;"
            >

                <h2>
                    貯金分析
                </h2>

                <div
                    class="summary-card"
                >

                <div>
                    現在残高
                </div>

                <div
                    id="savingBalance"
                >
                    0円
                </div>

            </div>

            <br>

            <div
                class="summary-card"
            >

                <div>
                    今月増減
                </div>

                <div
                    id="savingMonthlyChange"
                >
                    0円
                </div>

                <hr>

                <h3>
                    残高推移
                </h3>

                <canvas
                    id="assetChart"
                >
                </canvas>

                <div
                    id="assetHistory"
                >
                </div>

            </div>

        </div>

    </div>

    <!-- 設定ページ -->
    <div
        id="settingsPage"
        style="display:none;"
    >

        <h1>設定</h1>

        <h2>カテゴリ管理</h2>

        <input
            type="text"
            id="newCategory"
            placeholder="新しいカテゴリ"
        >

        <div class="category-type-group">

            <label>

                <input
                type="radio"
                name="categoryType"
                value="expense"
                checked
            >

            支出

        </label>

        <label>

            <input
                type="radio"
                name="categoryType"
                value="income"
            >

            収入

        </label>

    </div>

        <button
            type="button"
            id="addCategoryButton"
        >
            カテゴリ追加
        </button>

        <br><br>

        <div
            id="categoryList"
        >
        </div>

        <hr>

        <h2>支払方法管理</h2>

        <input
            type="text"
            id="newPayment"
            placeholder="新しい支払方法"
        >


        <div class="payment-type-group">

            <label>

            <input
                type="radio"
                name="paymentType"
                value="cash"
                checked
            >

            <span>現金</span>

        </label>

        <label>

            <input
                type="radio"
                name="paymentType"
                value="emoney"
            >

            <span>電子マネー</span>

        </label>

        <label>

            <input
                type="radio"
                name="paymentType"
                value="credit"
            >

            <span>クレジットカード</span>

        </label>

    </div>

        <input
            type="number"
            id="paymentDay"
            placeholder="支払日"
        >

        <br><br>

        <button
            type="button"
            id="addPaymentButton"
        >
            支払方法追加
        </button>

        <br><br>

        <div
            id="paymentList"
        >
        </div>

        <hr>

        <h2>
            固定費管理
        </h2>

        <div class="fixed-expense-form">

            <div class="fixed-expense-title">
                新しい固定費
            </div>

            <input
                type="text"
                id="fixedExpenseName"
                placeholder="名前"
            >

            <br><br>

            <input
                type="number"
                id="fixedExpenseAmount"
                placeholder="金額"
            >

            <br><br>

            <input
                type="number"
                id="fixedExpenseDay"
                placeholder="支払日"
            >

            <br><br>

        </div>

        <select
            id="fixedExpensePayment"
        >
        </select>

        <br><br>

        <button
            type="button"
            id="addFixedExpenseButton"
        >
            固定費追加
        </button>

        <hr>

        <div
            id="fixedExpenseEditModal"
            class="modal"
            style="display:none;"
        >

            <div class="modal-content">

                <h2>
                    固定費編集
                </h2>

            <input
                type="text"
                id="editFixedName"
                placeholder="名前"
            >

            <br><br>

            <input
                type="number"
                id="editFixedAmount"
                placeholder="金額"
            >

            <br><br>

            <input
                type="number"
                id="editFixedDay"
                placeholder="支払日"
            >

            <br><br>

            <select
                id="editFixedPayment"
            >
            </select>

            <br><br>

            <button
                id="saveFixedEditButton"
            >
                保存
            </button>

            <button
                id="cancelFixedEditButton"
            >
                キャンセル
            </button>

        </div>

        </div>

        <h3 class="fixed-expense-title">
            登録済み固定費
        </h3>

        <div
            id="fixedExpenseList"
        >
        </div>

        <h2>口座残高設定</h2>

        <div class="balance-setting-form">

            <div class="balance-setting-title">
                現在残高
            </div>

            <input
                id="balanceInput"
                placeholder="残高入力"
            >

            <br><br>

            <button
                id="saveBalanceButton"
            >
                残高保存
            </button>

        </div>

        <hr>

        <h2>データ管理</h2>

        <button
            type="button"
            id="exportDataButton"
        >
            バックアップ作成
        </button>

        <button
            type="button"
            id="importDataButton"
        >
           バックアップ復元
        </button>

        <input
            type="file"
            id="importFile"
            accept=".json"
            style="display:none;"
        >

        <hr>

        <button
            type="button"
            id="resetButton"
        >
            全データ削除
        </button>

    </div>

    <!-- 下部ナビ -->
    <div
        id="editModal"
        class="modal"
        style="display:none;"
    >

        <div class="modal-content">

            <h2>
                支出編集
            </h2>

            <input
                type="number"
                id="editAmount"
                placeholder="金額"
            >

            <br><br>

            <input
                type="date"
                id="editDate"
            >

            <br><br>

            <select
                id="editCategory"
            >
            </select>

            <br><br>

            <select
                id="editPayment"
            >
        </select>

            <input
                type="text"
                id="editMemo"
                placeholder="メモ"
            >

            <br><br>

            <select
                id="editType"
            >

                <option
                    value="expense"
                >
                    支出
                </option>

                <option
                    value="income"
                >
                    収入
                </option>

            </select>

            <br><br>

            <button
                id="saveEditButton"
            >
                保存
            </button>

            <button
                id="cancelEditButton"
            >
                キャンセル
            </button>

        </div>

    </div>

    <nav id="bottomNav">

        <button
            type="button"
            id="inputTab"
        >
            入力
        </button>

        <button
            type="button"
            id="historyTab"
        >
            履歴
        </button>

        <button
            type="button"
            id="analysisTab"
        >
            分析
        </button>

        <button
            type="button"
            id="settingsTab"
        >
            設定
        </button>

    </nav>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/category.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/fixed-expense.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/summary.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/balance.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/reset.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/expense-analysis.js"></script>
    <script src="js/income-analysis.js"></script>
    <script src="js/income-chart.js"></script>
    <script src="js/card-analysis.js"></script>
    <script src="js/fixed-analysis.js"></script>
    <script src="js/asset-analysis.js"></script>
    <script src="js/fixed-expense-generator.js"></script>
    <script src="js/app.js"></script>
    <script src="js/analysis-navigation.js"></script>
    <script src="js/backup.js"></script>

</body>
