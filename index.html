<body>

    <h1>家計簿アプリ</h1>

    <form>

        <h2>登録種別</h2>

        <label>
            <input
                type="radio"
                name="transactionType"
                value="expense"
                checked
            >
            支出
        </label>

        <label>
            <input
            type="radio"
            name="transactionType"
            value="income"
            >
            収入
        </label>

        <br>

        <h3>カテゴリ管理</h3>
        <input
            type="text"
            id="newCategory"
            placeholder="新しいカテゴリ"
        />

        <br><br>

        <label>
            <input
                type="radio"
                name="categoryType"
                value="expense"
                checked
            >
            支出カテゴリ
        </label>

        <label>
            <input
                type="radio"
                name="categoryType"
                value="income"
            >
            収入カテゴリ
        </label>

        <br><br>

        <button
            type="button"
            id="addCategoryButton"
        >
            カテゴリ追加
        </button>

        <br><br>

        <div>
            <label for="amount">金額</label>
            <input
                type="number"
                id="amount"
                placeholder="金額を入力"
            >
        </div>

        <br>

        <div>
            <label for="date">日付</label>
            <input
                type="date"
                id="date"
            >
        </div>

        <br>

        <div>
            <label for="category">カテゴリ</label>
            <select id="category">
            </select>
        </div>

        <br>

        <div>
            <label for="payment">支払方法</label>
            <select id="payment">
                <option>現金</option>
                <option>PayPay</option>
                <option>楽天カード</option>
            </select>
        </div>

        <h3>支払方法管理</h3>

        <input
            type="text"
            id="newPayment"
            placeholder="新しい支払方法"
        />

        <br><br>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="cash"
                checked
            >
            現金
        </label>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="emoney"
            >
            電子マネー
        </label>

        <label>
            <input
                type="radio"
                name="paymentType"
                value="credit"
            >
            クレジットカード
        </label>

        <br><br>

        <input
            type="number"
            id="paymentDay"
            placeholder="支払日（カードのみ）"
        />

        <button
            type="button"
            id="addPaymentButton"
        >
            支払方法追加
        </button>

        <br>

        <button 
            type="button"
            id="saveButton"
        >
            保存
        </button>

    </form>

    <hr>

    <h2>登録済み支出</h2>

    <h3>表示月</h3>

    <select id="expenseMonth">
    </select>

    <div id ="expenseList"></div>

    <hr>

    <h2>現在口座残高</h2>

    <div id="balanceDisplay">
        0円
    </div>

    <br>

    <input
        type="number"
        id="balanceInput"
        placeholder="残高入力"
    />

    <button
        type="button"
        id="saveBalanceButton"
    >
        残高保存
    </button>

    <hr>

    <h3>集計対象月</h3>

    <select id="summaryMonth">
    </select>

    <h2>支払方法別集計</h2>

    <div id="paymentSummary"></div>

    <hr>

    <h2>クレジットカード管理</h2>

    <div id="creditCardList"></div>

    <hr>

    <h2>開発用</h2>

    <button
        type="button"
        id="resetButton"
    >
        全データ削除
    </button>

    <script src="js/storage.js"></script>
    <script src="js/category.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/summary.js"></script>
    <script src="js/balance.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/reset.js"></script>
    <script src="js/app.js"></script>
</body>
