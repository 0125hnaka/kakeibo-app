<body>

    <h1>家計簿アプリ</h1>

    <form>

        <h2>登録種別</h2>

        <label>
            <input
                type="radio"
                name="transactionType"
                value="expense"
                checked
            >
            支出
        </label>

        <label>
            <input
            type="radio"
            name="transactionType"
            value="income"
            >
            収入
        </label>

        <br><br>

        <div>
            <label for="amount">金額</label>
            <input
                type="number"
                id="amount"
                placeholder="金額を入力"
            >
        </div>

        <br>

        <div>
            <label for="date">日付</label>
            <input
                type="date"
                id="date"
            >
        </div>

        <br>

        <div>
            <label for="category">カテゴリ</label>
            <select id="category">
            </select>
        </div>

        <br>

        <div>
            <label for="payment">支払方法</label>
            <select id="payment">
                <option>現金</option>
                <option>PayPay</option>
                <option>楽天カード</option>
            </select>
        </div>

        <br>

        <button 
            type="button"
            id="saveButton"
        >
            保存
        </button>

    </form>

    <hr>

    <h2>登録済み支出</h2>

    <div id ="expenseList"></div>

    <script src="js/app.js"></script>
</body>
